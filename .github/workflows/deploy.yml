on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./vite-project

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        
      - name: 🔧 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # 【修改】：删除了之前的 cache 缓存配置，直接绕过找不到文件的报错
          
      - name: 📦 安装依赖
        # 【修改】：换成 npm install，它不强制要求提交 package-lock.json
        run: npm install
        
      - name: 🔍 代码检查
        run: npm run lint --if-present
        
      - name: 🧪 运行测试
        run: npm run test --if-present
        
      - name: 🏗️ 构建项目
        run: npm run build
        
      - name: 📤 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./vite-project/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 部署
        id: deployment
        uses: actions/deploy-pages@v4
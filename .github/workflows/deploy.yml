on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # 【重点新增】：告诉 GitHub 所有的命令都在 vite-project 这个文件夹里执行
    defaults:
      run:
        working-directory: ./vite-project

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        
      - name: 🔧 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          # 【重点新增】：告诉 GitHub 去 vite-project 里面找缓存依赖
          cache-dependency-path: ./vite-project/package-lock.json
          
      - name: 📦 安装依赖
        run: npm ci
        
      - name: 🔍 代码检查
        run: npm run lint --if-present
        
      - name: 🧪 运行测试
        run: npm run test --if-present
        
      - name: 🏗️ 构建项目
        run: npm run build
        
      - name: 📤 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          # 【重点修改】：告诉 GitHub 打包产物在这个路径下
          path: ./vite-project/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 部署
        id: deployment
        uses: actions/deploy-pages@v4